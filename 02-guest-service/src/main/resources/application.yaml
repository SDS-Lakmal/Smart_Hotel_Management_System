spring:
  application:
    name: guest-service
  
  datasource:
    # change your db name
    url: jdbc:mysql://localhost:3306/guest_db
    username: root
    # do not change this section. it will take password from environment variable
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect