server:
  port: 8084

spring:
  application:
    name: staff-service
  datasource:
    url: jdbc:mysql://localhost:3306/hotel_staff
    username: root
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}



